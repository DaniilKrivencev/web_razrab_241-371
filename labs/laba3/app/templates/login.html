{% extends 'base.html' %}

{% block content %}

<div class="auth-wrap">
  <div class="auth-card">

    <!-- Иконка -->
    <div class="auth-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/>
      </svg>
    </div>

    <h1 class="auth-title">Вход в систему</h1>
    <p class="auth-subtitle">Логин: <code>user</code> &nbsp;·&nbsp; Пароль: <code>qwerty</code></p>

    <form method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}"
          id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="login-username">Логин</label>
        <input
          class="form-input"
          type="text"
          id="login-username"
          name="username"
          placeholder="Введите логин"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Пароль</label>
        <div class="password-wrap">
          <input
            class="form-input"
            type="password"
            id="login-password"
            name="password"
            placeholder="Введите пароль"
            autocomplete="current-password"
            required
          >
          <button type="button" class="toggle-password" id="toggle-pwd" tabindex="-1"
                  onclick="togglePassword()">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label class="checkbox-label" for="login-remember">
          <input type="checkbox" id="login-remember" name="remember">
          <span class="checkbox-custom"></span>
          Запомнить меня
        </label>
      </div>

      <button type="submit" class="btn-submit btn-submit--full" id="login-submit">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/>
        </svg>
        Войти
      </button>

    </form>

  </div>
</div>

<script>
function togglePassword() {
  const pwd = document.getElementById('login-password');
  const ico = document.getElementById('eye-icon');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    ico.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" x2="23" y1="1" y2="23"/>';
  } else {
    pwd.type = 'password';
    ico.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>

{% endblock %}
