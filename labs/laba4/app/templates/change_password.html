{% extends "base.html" %}

{% block content %}
<header class="page-header text-center">
    <div class="container animate-fadedown">
        <div class="header-badge text-warning">БЕЗОПАСНОСТЬ</div>
        <h1 class="header-title">Изменить пароль</h1>
        <p class="header-subtitle">Текущий пользователь: {{ current_user.login }}</p>
    </div>
</header>

<div class="container py-5 animate-fadeup mw-600">
    <div class="card bg-dark-soft border-0 shadow-lg rounded-4 p-4">
        <form method="POST">
            <div class="mb-3">
                <label for="old_password" class="form-label">Старый пароль</label>
                <input type="password" class="form-control" id="old_password" name="old_password" required>
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">Новый пароль</label>
                <input type="password" class="form-control" id="new_password" name="new_password" required>
                <div class="form-text text-secondary small">Минимум 8 знаков, заглавная, цифра, без пробелов.</div>
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label">Повторите новый пароль</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-glow">Сменить пароль</button>
            </div>
        </form>
    </div>
    <div class="text-center mt-4">
        <a href="{{ url_for('index') }}" class="btn btn-link text-secondary text-decoration-none">Отмена</a>
    </div>
</div>
{% endblock %}
