{% extends "base.html" %}

{% block content %}
<header class="page-header text-center">
    <div class="container animate-fadedown">
        <div class="header-badge">Отчет</div>
        <h1 class="header-title">Статистика по пользователям</h1>
        <div class="mt-4">
            <a href="{{ url_for('reports.index') }}" class="btn btn-outline-secondary rounded-pill">Назад к журналу</a>
        </div>
    </div>
</header>

<div class="container py-5 animate-fadeup mw-800">
    <div class="card bg-dark-soft border-0 shadow-lg rounded-4 overflow-hidden mb-5">
        <div class="card-body p-0">
            <table class="table table-dark table-hover table-borderless mb-0 align-middle">
                <thead class="bg-dark-header border-bottom border-secondary">
                    <tr class="text-secondary text-uppercase small ls-1">
                        <th class="px-4 py-4">№</th>
                        <th class="px-4 py-4">Пользователь</th>
                        <th class="px-4 py-4 text-end">Посещений</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in stats %}
                    <tr class="border-bottom border-dark-soft">
                        <td class="px-4 py-4 text-secondary font-monospace">{{ loop.index }}</td>
                        <td class="px-4 py-4">
                            {% if row[1] %}
                                <span class="fw-bold">{{ row[1] }} {{ row[2] }}</span>
                            {% else %}
                                <span class="text-secondary italic">Гость</span>
                            {% endif %}
                        </td>
                        <td class="px-4 py-4 text-end fw-bold">{{ row[4] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center">
        <a href="{{ url_for('reports.export_csv', type='users') }}" class="btn btn-success rounded-pill px-5 shadow-glow">Экспорт в CSV</a>
    </div>
</div>
{% endblock %}
