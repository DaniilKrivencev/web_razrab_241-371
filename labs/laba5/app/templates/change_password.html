{% extends "base.html" %}

{% block content %}
<div class="auth-wrap animate-fadeup">
    <div class="auth-card glass-card p-5 shadow-2xl">
        <div class="auth-icon mb-4" style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.25); color: var(--warning); width: 64px; height: 64px; margin: 0 auto; display: flex; align-items: center; justify-content: center; border-radius: 16px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        
        <h2 class="auth-title text-center text-white h3 fw-bold mb-1">Безопасность</h2>
        <p class="auth-subtitle text-center text-secondary small mb-5">Изменение пароля для пользователя <strong>{{ current_user.login }}</strong></p>

        <form method="POST">
            <div class="form-group mb-4">
                <label class="form-label text-secondary small fw-bold mb-2 d-block" for="old_password">Текущий пароль</label>
                <input type="password" name="old_password" id="old_password" class="form-input bg-dark-soft border-secondary text-white p-3 rounded-3 w-100" placeholder="••••••••" required style="outline: none;">
            </div>

            <div class="form-group mb-4">
                <label class="form-label text-secondary small fw-bold mb-2 d-block" for="new_password">Новый пароль</label>
                <input type="password" name="new_password" id="new_password" class="form-input bg-dark-soft border-secondary text-white p-3 rounded-3 w-100" placeholder="Минимум 8 знаков" required style="outline: none;">
                <div class="mt-2 d-flex align-items-start gap-2" style="font-size: 0.72rem; color: var(--text-muted); line-height: 1.4;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="mt-1" style="flex-shrink: 0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    <span>Минимум 8 знаков, заглавная буква, цифра, без пробелов.</span>
                </div>
            </div>

            <div class="form-group mb-5">
                <label class="form-label text-secondary small fw-bold mb-2 d-block" for="confirm_password">Повторите новый пароль</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-input bg-dark-soft border-secondary text-white p-3 rounded-3 w-100" placeholder="••••••••" required style="outline: none;">
            </div>

            <div class="d-flex flex-column gap-3">
                <button type="submit" class="btn-submit btn-submit--full py-3 fw-bold ls-1 text-uppercase" style="font-size: 0.85rem;">Обновить пароль</button>
                <a href="{{ url_for('index') }}" class="text-center text-muted small py-2 text-decoration-none transition-all" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-muted)'">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
