{% extends "base.html" %}
{% from "macros/form.html" import user_form %}

{% block content %}
<header class="page-header text-center">
    <div class="container animate-fadedown">
        <div class="header-badge">НОВЫЙ ПОЛЬЗОВАТЕЛЬ</div>
        <h1 class="header-title">Создание записи</h1>
        <p class="header-subtitle">Заполните данные и выберите роль из БД</p>
    </div>
</header>

<div class="container py-5 animate-fadeup mw-600">
    <div class="card bg-dark-soft border-0 shadow-lg rounded-4 p-4">
        {{ user_form(url_for('create_user'), roles, errors, form_data) }}
    </div>
    <div class="text-center mt-4">
        <a href="{{ url_for('index') }}" class="btn btn-link text-secondary text-decoration-none">← Вернуться к списку</a>
    </div>
</div>
{% endblock %}
